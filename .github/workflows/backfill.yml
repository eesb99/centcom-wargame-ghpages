name: Daily OSINT Calibration
on:
  schedule:
    # 07:00 UTC — fallback, 4h after Mac Mini launchd (03:00 UTC)
    # Mac Mini is primary; GH Actions skips if no diff remains
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: calibrate (default) or backfill'
        required: false
        default: 'calibrate'
        type: choice
        options:
          - calibrate
          - backfill
jobs:
  calibrate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run daily calibration
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          RUN_MODE: ${{ github.event.inputs.mode || 'calibrate' }}
        run: |
          if [ "$RUN_MODE" = "backfill" ]; then
            node backfill.js --patch
          else
            node backfill.js --calibrate
          fi

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add index.html
            git add conflict_timeline.json 2>/dev/null || true
            git commit -m "chore: daily OSINT calibration $(date -u +%Y-%m-%d)"
            git push
          fi
