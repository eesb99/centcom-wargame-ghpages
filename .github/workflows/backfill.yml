name: Hourly OSINT Backfill
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
jobs:
  backfill:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run backfill
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: node backfill.js --patch
      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add index.html conflict_timeline.json && git commit -m "chore: hourly OSINT backfill $(date -u +%Y-%m-%dT%H:%M)" && git push)
